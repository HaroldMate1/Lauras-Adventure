<script>// ============ AUDIO SYSTEM ============
const AudioSys={ctx:null,init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)()},
play(freq,dur,type='square',vol=0.15){if(!this.ctx)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();
o.connect(g);g.connect(this.ctx.destination);o.type=type;o.frequency.value=freq;g.gain.value=vol;
g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);o.start();o.stop(this.ctx.currentTime+dur)},
jump(){this.play(500,0.1);setTimeout(()=>this.play(700,0.1),50)},
shoot(){this.play(1200,0.08,'sawtooth',0.1);setTimeout(()=>this.play(800,0.1,'sawtooth',0.08),40)},
coin(){this.play(988,0.08);setTimeout(()=>this.play(1319,0.15),80)},
hit(){this.play(200,0.2,'sawtooth',0.2);setTimeout(()=>this.play(150,0.15,'sawtooth',0.15),100)},
enemyDie(){this.play(600,0.05);setTimeout(()=>this.play(400,0.08),30);setTimeout(()=>this.play(200,0.1),60)},
summon(){this.play(523,0.1);setTimeout(()=>this.play(659,0.1),100);setTimeout(()=>this.play(784,0.1),200);setTimeout(()=>this.play(1047,0.2),300)},
celebrate(){const notes=[523,659,784,1047,784,659,523,659,784,1047,1319];notes.forEach((n,i)=>{setTimeout(()=>this.play(n,0.2,'square',0.12),i*150)})},
power(){this.play(440,0.06);setTimeout(()=>this.play(554,0.06),60);setTimeout(()=>this.play(659,0.06),120);setTimeout(()=>this.play(880,0.18),180)},
piano(){this.play(523,0.07,'sine',0.15);setTimeout(()=>this.play(659,0.07,'sine',0.12),55);setTimeout(()=>this.play(784,0.06,'sine',0.10),110);setTimeout(()=>this.play(1047,0.08,'sine',0.12),165)}
};
// ============ BACKGROUND MUSIC (acoustic pop loop, Morat-style) ============
const MusicSys={
  playing:false,nodes:[],loop:null,
  start(){
    if(this.playing||!AudioSys.ctx)return;
    this.playing=true;this._schedule(AudioSys.ctx.currentTime);
  },
  stop(){this.playing=false;this.nodes.forEach(n=>{try{n.stop();}catch(e){}});this.nodes=[];},
  _n(freq,t,dur,vol=0.07,type='triangle'){
    const ac=AudioSys.ctx,o=ac.createOscillator(),g=ac.createGain(),c=ac.createBiquadFilter();
    c.type='lowpass';c.frequency.value=1800;
    o.connect(c);c.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.05);this.nodes.push(o);
  },
  _schedule(t){
    if(!this.playing)return;
    // Chord progression: C-G-Am-F in C major, bpm≈110
    const b=0.545; // one beat
    // Bass notes (roots)
    [[130.8,0],[196,b*2],[220,b*4],[174.6,b*6]].forEach(([f,o])=>this._n(f,t+o,b*1.8,0.09,'sine'));
    // Chord tones (mid)
    [[261.6,0],[329.6,0.1],[392,0.2],  [196,b*2],[246.9,b*2+0.1],[293.7,b*2+0.2],
     [220,b*4],[261.6,b*4+0.1],[329.6,b*4+0.2],  [174.6,b*6],[220,b*6+0.1],[261.6,b*6+0.2]
    ].forEach(([f,o])=>this._n(f,t+o,b*0.6,0.05,'triangle'));
    // Melody (single line on top)
    const mel=[[523.3,0],[493.9,b*0.5],[440,b],[392,b*1.5],[440,b*2],[493.9,b*2.5],
               [523.3,b*3],[587.3,b*3.5],[523.3,b*4],[440,b*4.5],[392,b*5],[349.2,b*5.5],
               [392,b*6],[440,b*6.5],[523.3,b*7],[493.9,b*7.5]];
    mel.forEach(([f,o])=>this._n(f,t+o,b*0.42,0.06,'triangle'));
    const loopLen=b*8;
    const delay=(t+loopLen-AudioSys.ctx.currentTime)*1000-300;
    this.loop=setTimeout(()=>{if(this.playing)this._schedule(t+loopLen);},Math.max(50,delay));
  }
};

mateoShoe:'#444',bug:'#cc3333',segfault:'#aa2222',projectile:'#8b5cf6',

function drawPixel(ctx,x,y,color,s=2){ctx.fillStyle=color;ctx.fillRect(x,y,s,s)}

// ============ CHARACTER SPRITES ============
function drawLaura(ctx,x,y,frame,dir,jumping){
  const s=2,f=frame%30;
  const bob=jumping?0:Math.sin(f*0.5)*1.5;
  const flip=dir<0;
  // pk/pw helpers mirror the whole sprite when facing left — face "rotates" with direction
  const pk=(c,bx,by)=>{ctx.fillStyle=c;const fx=flip?(15-bx):bx;ctx.fillRect(x+fx*s,y+by*s+bob,s,s)};
  const pw=(c,bx,by,w,h)=>{ctx.fillStyle=c;for(let dx=0;dx<w;dx++)for(let dy=0;dy<h;dy++){const fx=flip?(15-(bx+dx)):(bx+dx);ctx.fillRect(x+fx*s,y+(by+dy)*s+bob,s,s)}};
  const hairC=COLORS.lauraHair,skinC=COLORS.lauraSkin,topC='#3a7bd4',legC='#2d2d44',shoeC='#ff6b6b';
  // Hair top
  pw(hairC,5,0,5,1);pw(hairC,4,1,7,1);pw(hairC,4,2,7,1);pw('#e0c050',5,0,3,1);
  // Ponytail with bounce (trails behind — auto-mirrors with flip)
  const ptS=jumping?-2:Math.sin(f*0.35)*2.5;
  for(let j=0;j<7;j++){const ox=Math.round(ptS*j*0.12);pk(hairC,11+ox,1+j);if(j<5)pk(hairC,12+ox,1+j);if(j<3)pk('#e0c050',12+ox,2+j)}
  // Face
  pw(skinC,5,3,5,4);pk(skinC,4,4);pk(skinC,4,5);pk(skinC,10,4);pk(skinC,10,5);
  pk(skinC,4,4);pk(skinC,10,4); // ears
  // Sport sunglasses (wraparound)
  pw('#222',5,4,2,1);pw('#222',8,4,2,1);pk('#444',7,4);pk('#333',4,4);pk('#333',10,4);
  pk('#1a1a6a',5,4);pk('#1a1a6a',6,4);pk('#1a1a6a',8,4);pk('#1a1a6a',9,4);
  pk('#f0a8a0',7,5); // nose
  pk('#d4868a',6,6);pk('#d4868a',7,6);pk('#d4868a',8,6); // smile
  pk(skinC,7,7);pk(skinC,8,7); // neck
  // Tank top
  pw(topC,5,8,5,1);pw(topC,4,9,7,3);pw(topC,5,12,5,1);
  pk('#2255bb',5,8);pk('#2255bb',9,8); // straps
  pk('#2255bb',4,10);pk('#2255bb',10,10); // shading
  // Arms (simple sine pump)
  const armSwing=jumping?-3:Math.sin(f*0.4)*2.5;
  const aUp=Math.round(armSwing),aDown=Math.round(-armSwing);
  pk(skinC,3,9+aUp);pk(skinC,3,10+aUp);pk(skinC,2,10+aUp);
  pk(skinC,11,9+aDown);pk(skinC,11,10+aDown);pk(skinC,12,10+aDown);
  // Leggings (dark with coral stripe)
  pw(legC,5,13,2,5);pw(legC,8,13,2,5);
  pw('#1e1e30',7,15,1,3); // gap
  pk('#ff8080',5,14);pk('#ff8080',5,15);pk('#ff8080',5,16);
  pk('#ff8080',9,14);pk('#ff8080',9,15);pk('#ff8080',9,16);
  // Running shoes
  pw(shoeC,4,18,3,1);pw(shoeC,8,18,3,1);
  pk('#fff',4,18);pk('#fff',10,18);
  pk('#ff5252',5,18);pk('#ff5252',9,18);
}

function drawLauraFront(ctx,x,y,frame){

  const pw=(c,bx,by,w,h)=>{ctx.fillStyle=c;for(let dx=0;dx<w;dx++)for(let dy=0;dy<h;dy++)ctx.fillRect(x+(bx+dx)*s,y+(by+dy)*s+bob,s,s)};
  const hairC=COLORS.lauraHair,skinC=COLORS.lauraSkin,topC='#ff6b6b',legC='#2d2d44',shoeC='#ff6b6b';

  pk(hairC,3,3);pk(hairC,3,4);pk(hairC,3,5);pk(hairC,3,6);
  pk(hairC,12,3);pk(hairC,12,4);pk(hairC,12,5);pk(hairC,12,6);
  // Face

  pk(skinC,3,4);pk(skinC,3,5);pk(skinC,12,4);pk(skinC,12,5); // ears

  pk('#333',7,4);pk('#333',8,4); // bridge

  pw(legC,4,13,4,5);pw(legC,8,13,4,5);
  pk('#ff8080',4,14);pk('#ff8080',4,15);pk('#ff8080',4,16);

  pw(shoeC,3,18,5,1);pw(shoeC,8,18,5,1);

function drawAndres(ctx,x,y,frame,dir=1){
  const s=2,f=frame%32;
  const bob=Math.abs(Math.sin(f*Math.PI/16))*2;
  const flip=dir<0;
  const fi=Math.floor(f/8);
  const ST=[[2,-2,0,-2],[1,0,0,-1],[-2,2,0,-2],[-1,0,0,-1]];
  const [fsx,bsx,fky,bky]=ST[fi];
  const armPhase=Math.sin(f*Math.PI/16)*2.5;
  const aUp=Math.round(armPhase),aDown=Math.round(-armPhase);
  const pk=(c,bx,by)=>{ctx.fillStyle=c;const fx=flip?(15-bx):bx;ctx.fillRect(x+fx*s,y+by*s+bob,s,s)};
  const pw=(c,bx,by,w,h)=>{ctx.fillStyle=c;for(let dx=0;dx<w;dx++)for(let dy=0;dy<h;dy++){const fx=flip?(15-(bx+dx)):(bx+dx);ctx.fillRect(x+fx*s,y+(by+dy)*s+bob,s,s)}};
  const hairC='#1a1208',skinC='#c8a070',shirtC='#e8ddc8',shortC='#1e1e38',shoeC='#888898';
  // Back leg
  pw(shortC,5+bsx,13,2,5);pw(skinC,5+bsx,18+bky,2,2);pw(shoeC,4+bsx,20+bky,4,1);pk('#aaaaaa',5+bsx,20+bky);
  // Back arm
  pk(skinC,3,9+aDown);pk(skinC,3,10+aDown);pk(skinC,2,11+aDown);
  // Hair (short, dark)
  pw(hairC,4,0,8,3);pk('#0a0808',4,2);pk('#0a0808',11,2);pk('#2a2018',5,0);
  // Face
  pw(skinC,5,3,6,5);pk(skinC,4,4);pk(skinC,4,5);pk(skinC,11,4);pk(skinC,11,5);
  // Large rectangular sunglasses
  pw('#111',5,4,7,2);pk('#1a1a1a',4,4);pk('#1a1a1a',12,5);
  pk('#001830',6,4);pk('#001830',7,4);pk('#001830',8,4);pk('#001830',9,4);pk('#001830',10,4);
  pk('#907040',7,7);pk('#785830',7,8);
  pk(skinC,7,9);pk(skinC,8,9);
  // Cream shirt with dark red collar
  pw(shirtC,4,10,8,5);
  pk('#7a1a1a',7,10);pk('#7a1a1a',8,10);
  pk('#f8f0dc',4,10);pk('#c8bda0',11,10);
  pk('#c0b890',7,12);pk('#c0b890',7,13);
  // Front arm
  pk(skinC,12,10+aUp);pk(skinC,12,11+aUp);pk(skinC,13,12+aUp);
  // Front leg
  pw(shortC,8+fsx,13,2,5);pw(skinC,8+fsx,18+fky,2,2);pw(shoeC,7+fsx,20+fky,4,1);pk('#aaaaaa',8+fsx,20+fky);
}

function drawJosefina(ctx,x,y,frame,dir=1){
  const s=2,f=frame%32;
  const bob=Math.abs(Math.sin(f*Math.PI/16))*2;
  const flip=dir<0;
  const pk=(c,bx,by)=>{ctx.fillStyle=c;const fx=flip?(15-bx):bx;ctx.fillRect(x+fx*s,y+by*s+bob,s,s)};
  const pw=(c,bx,by,w,h)=>{ctx.fillStyle=c;for(let dx=0;dx<w;dx++)for(let dy=0;dy<h;dy++){const fx=flip?(15-(bx+dx)):(bx+dx);ctx.fillRect(x+fx*s,y+(by+dy)*s+bob,s,s)}};

  pk(skinC,11,9+aD);pk(skinC,11,10+aD);pk(skinC,12,10+aD);
  pw(legC,5,13,2,5);pw(legC,8,13,2,5);pw('#1e1e30',7,15,1,3);

function drawHelena(ctx,x,y,frame,dir=1){
  const s=2,f=frame%32;
  const bob=Math.abs(Math.sin(f*Math.PI/16))*2;

function drawHaussmannBuilding(ctx,bx,by,bw,bh,color,darkColor){

// Roof ridge

// Chimneys
ctx.fillStyle='#6a5a4a';
if(bw>40){ctx.fillRect(bx+8,by-roofH-12,6,12);ctx.fillRect(bx+bw-14,by-roofH-10,6,10);
ctx.fillStyle='#7a6a5a';ctx.fillRect(bx+7,by-roofH-14,8,4);ctx.fillRect(bx+bw-15,by-roofH-12,8,4)}
// Dormer windows in mansard
ctx.fillStyle='#bdd0e8';
if(bw>50){for(let d=0;d<2;d++){const dx=bx+bw*0.3+d*bw*0.35;
ctx.fillRect(dx,by-roofH+4,6,7);ctx.fillStyle='#5a5a6a';
ctx.beginPath();ctx.moveTo(dx-1,by-roofH+4);ctx.lineTo(dx+3,by-roofH-1);ctx.lineTo(dx+7,by-roofH+4);ctx.closePath();ctx.fill();
ctx.fillStyle='#bdd0e8'}}
// Decorative cornice (horizontal band below roof)
ctx.fillStyle=darkColor;ctx.fillRect(bx-2,by,bw+4,3);
ctx.fillStyle='#d8c8a8';ctx.fillRect(bx-1,by+3,bw+2,2);
// Floors with windows, balconies, shutters
const floorH=Math.max(16,(bh-5)/Math.max(1,Math.floor(bh/20)));
const winW=8,winH=10;
for(let fy=by+8;fy<by+bh-15;fy+=floorH){
// Floor separator / cornice
ctx.fillStyle=darkColor;ctx.fillRect(bx,fy-2,bw,1);
// Windows with shutters and balconies
for(let wx=bx+8;wx<bx+bw-12;wx+=Math.max(16,bw/3|0)){

// Iron balcony railing (thin line below window)

// Balcony posts
ctx.fillRect(wx-4,fy+winH,1,3);ctx.fillRect(wx+winW+3,fy+winH,1,3);
// Ornamental railing pattern
for(let r=0;r<winW+6;r+=3)ctx.fillRect(wx-3+r,fy+winH+1,1,2);
}}

function drawParallaxBG(ctx,camX){
const progress=camX/LEVEL_WIDTH;
// Sky gradient — Paris always
const skyGrad=ctx.createLinearGradient(0,0,0,H);
skyGrad.addColorStop(0,'#7ec8e3');skyGrad.addColorStop(0.3,'#b8d4e8');
skyGrad.addColorStop(0.6,'#e8d0b0');skyGrad.addColorStop(1,'#f0c880');
ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);
// Sun glow
ctx.fillStyle='rgba(255,220,150,0.15)';ctx.beginPath();ctx.ellipse(W*0.75,80,120,120,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='rgba(255,240,200,0.1)';ctx.beginPath();ctx.ellipse(W*0.75,80,200,200,0,0,Math.PI*2);ctx.fill();
// Clouds (softer, Parisian)
for(let i=0;i<10;i++){const cx=(i*220-camX*0.04)%1100-150;const cy=25+Math.sin(i*1.7)*35;
ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.ellipse(cx,cy,50+i*5,14+i*2,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.ellipse(cx+25,cy-5,35,10,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(cx-20,cy+3,30,9,0,0,Math.PI*2);ctx.fill()}

// === FAR BACKGROUND BUILDINGS (Haussmann style) ===
const far=camX*0.08;

// Sacré-Cœur Romano-Byzantine — drawn BEFORE buildings so dome peeks above skyline
if(camX<LEVEL_WIDTH*0.4){const scx=310-far*0.22;
// Scale 0.72x anchored at base — dome/cross protrude above Haussmann rooftops
ctx.save();ctx.translate(scx,H);ctx.scale(0.72,0.72);ctx.translate(-scx,-H);ctx.globalAlpha=0.88;
const sc='#f9f3ec',scd='#ede2d4',scs='#d6c9b8',scsh='#c8baa8';
// Montmartre hill — layered green mound
ctx.fillStyle='#4a7a38';ctx.beginPath();ctx.ellipse(scx,H-248,125,60,0,0,Math.PI);ctx.fill();
ctx.fillStyle='#5a8a48';ctx.beginPath();ctx.ellipse(scx,H-255,100,45,0,0,Math.PI);ctx.fill();
ctx.fillStyle='#6a9a58';ctx.beginPath();ctx.ellipse(scx,H-260,75,32,0,0,Math.PI);ctx.fill();
// Grand staircase (wide, many steps)
for(let si=0;si<8;si++){const sw=130-si*8;ctx.fillStyle=si%2===0?scd:scs;ctx.fillRect(scx-sw/2,H-268+si*5,sw,5);}
// Wide portico base
ctx.fillStyle=sc;ctx.fillRect(scx-62,H-308,124,40);
// Cornice line
ctx.fillStyle=scsh;ctx.fillRect(scx-62,H-308,124,4);
// Three wide arched doorways on portico
for(let d=-1;d<=1;d++){const dx=scx+d*34;
ctx.fillStyle=scs;
ctx.beginPath();ctx.arc(dx,H-293,11,Math.PI,0);ctx.rect(dx-11,H-293,22,18);ctx.fill();
ctx.fillStyle=scsh;ctx.beginPath();ctx.arc(dx,H-293,8,Math.PI,0);ctx.rect(dx-8,H-293,16,12);ctx.fill();}
// Decorative columns between arches
for(let d=-2;d<=2;d++){const dx=scx+d*22;
ctx.fillStyle=sc;ctx.fillRect(dx-3,H-308,6,40);
ctx.fillStyle=scsh;ctx.fillRect(dx-3,H-308,6,5);}// capitals
// Main nave body (wider, taller)
ctx.fillStyle=sc;ctx.fillRect(scx-50,H-360,100,54);
ctx.fillStyle=scsh;ctx.fillRect(scx-50,H-360,100,4);// upper cornice
// Blind arcading on nave walls (decorative arches)
for(let d=-2;d<=2;d++){const dx=scx+d*20;
ctx.fillStyle=scd;ctx.beginPath();ctx.arc(dx,H-328,8,Math.PI,0);ctx.rect(dx-8,H-328,16,12);ctx.fill();}
// LEFT bell tower
const lt=scx-58;
ctx.fillStyle=sc;ctx.fillRect(lt,H-370,22,70);
ctx.fillStyle=scsh;ctx.fillRect(lt,H-370,22,4);
// Bell tower windows (paired arches)
for(let r=0;r<2;r++){ctx.fillStyle=scs;ctx.beginPath();ctx.arc(lt+7,H-345+r*18,5,Math.PI,0);ctx.rect(lt+2,H-345+r*18,10,10);ctx.fill();}
// Bell tower dome cap (onion dome shape)
ctx.fillStyle=scd;
ctx.beginPath();ctx.moveTo(lt-4,H-370);ctx.quadraticCurveTo(lt+11,H-408,lt+26,H-370);ctx.closePath();ctx.fill();
ctx.fillStyle=sc;ctx.beginPath();ctx.ellipse(lt+11,H-375,9,6,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=scsh;ctx.fillRect(lt+10,H-408,3,10);// spire
// RIGHT bell tower
const rt=scx+36;
ctx.fillStyle=sc;ctx.fillRect(rt,H-370,22,70);
ctx.fillStyle=scsh;ctx.fillRect(rt,H-370,22,4);
for(let r=0;r<2;r++){ctx.fillStyle=scs;ctx.beginPath();ctx.arc(rt+7,H-345+r*18,5,Math.PI,0);ctx.rect(rt+2,H-345+r*18,10,10);ctx.fill();}
ctx.fillStyle=scd;
ctx.beginPath();ctx.moveTo(rt-4,H-370);ctx.quadraticCurveTo(rt+11,H-408,rt+26,H-370);ctx.closePath();ctx.fill();
ctx.fillStyle=sc;ctx.beginPath();ctx.ellipse(rt+11,H-375,9,6,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=scsh;ctx.fillRect(rt+10,H-408,3,10);
// Left flanking small dome (over transept)
ctx.fillStyle=scd;
ctx.beginPath();ctx.moveTo(scx-42,H-360);ctx.quadraticCurveTo(scx-28,H-398,scx-14,H-360);ctx.closePath();ctx.fill();
ctx.fillStyle=sc;ctx.beginPath();ctx.ellipse(scx-28,H-365,8,5,0,0,Math.PI*2);ctx.fill();
// Vertical dome ribs on small left dome
ctx.strokeStyle=scsh;ctx.lineWidth=1;
for(let r=-2;r<=2;r++){ctx.beginPath();ctx.moveTo(scx-28,H-365);ctx.quadraticCurveTo(scx-28+r*6,H-390,scx-28+r*3,H-398);ctx.stroke();}
// Lantern on small left dome
ctx.fillStyle=sc;ctx.fillRect(scx-30,H-408,5,12);ctx.beginPath();ctx.arc(scx-28,H-408,5,Math.PI,0);ctx.fill();
ctx.fillStyle=scsh;ctx.fillRect(scx-29,H-418,3,10);
// Right flanking small dome (over transept)
ctx.fillStyle=scd;
ctx.beginPath();ctx.moveTo(scx+14,H-360);ctx.quadraticCurveTo(scx+28,H-398,scx+42,H-360);ctx.closePath();ctx.fill();
ctx.fillStyle=sc;ctx.beginPath();ctx.ellipse(scx+28,H-365,8,5,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=scsh;ctx.lineWidth=1;
for(let r=-2;r<=2;r++){ctx.beginPath();ctx.moveTo(scx+28,H-365);ctx.quadraticCurveTo(scx+28+r*6,H-390,scx+28+r*3,H-398);ctx.stroke();}
ctx.fillStyle=sc;ctx.fillRect(scx-1+28,H-408,5,12);ctx.beginPath();ctx.arc(scx+28,H-408,5,Math.PI,0);ctx.fill();
ctx.fillStyle=scsh;ctx.fillRect(scx+27,H-418,3,10);
// CENTRAL elongated dome — tall, ovoid (Byzantine style)
const dc=scx,db=H-360;
// Drum base (cylindrical)
ctx.fillStyle=scd;ctx.fillRect(dc-18,db-22,36,22);
// Drum windows (8 arched windows)
for(let w=0;w<4;w++){const wx=dc-13+w*9;
ctx.fillStyle=scs;ctx.beginPath();ctx.arc(wx+4,db-12,4,Math.PI,0);ctx.rect(wx,db-12,8,8);ctx.fill();}
// Main elongated dome body
ctx.fillStyle=sc;
ctx.beginPath();ctx.moveTo(dc-18,db-22);
ctx.quadraticCurveTo(dc-20,db-60,dc,db-90);
ctx.quadraticCurveTo(dc+20,db-60,dc+18,db-22);
ctx.closePath();ctx.fill();
// Dome ribs (8 ribs from base to apex)
ctx.strokeStyle=scsh;ctx.lineWidth=1.5;
for(let r=-3;r<=3;r++){ctx.beginPath();ctx.moveTo(dc+r*6,db-22);ctx.quadraticCurveTo(dc+r*14,db-56,dc,db-90);ctx.stroke();}
// Dome highlight band (lighter center)
ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.ellipse(dc-4,db-55,5,24,0.3,0,Math.PI*2);ctx.fill();
// Lantern base on main dome
ctx.fillStyle=scd;ctx.beginPath();ctx.ellipse(dc,db-90,10,6,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=sc;ctx.fillRect(dc-5,db-106,10,16);
ctx.fillStyle=scd;ctx.beginPath();ctx.arc(dc,db-106,5,Math.PI,0);ctx.fill();
// Cross on top
ctx.fillStyle=scsh;ctx.fillRect(dc-1,db-126,3,20);ctx.fillRect(dc-6,db-120,14,3);
ctx.restore();ctx.globalAlpha=1;
}

// Haussmann buildings drawn ON TOP of Sacré-Cœur (they're in the foreground)
for(let i=0;i<25;i++){
const bx=i*90-far%90-90;const bh=70+Math.sin(i*2.3)*30+((i*7)%20);
const bw=75+((i*13)%20);
const colors=[['#f0e0cc','#d8c8a8'],['#e8d5c0','#d0c0a0'],['#f5e8d8','#ddd0b8'],['#ece0d0','#d4c4a4']];
const [c,d]=colors[i%4];
drawHaussmannBuilding(ctx,bx,H-200-bh,bw,bh,c,d);
}

// Arc de Triomphe (visible in section 3: 40–70% progress)
if(progress>0.4&&progress<0.72){
const atx=W*0.55-(camX-LEVEL_WIDTH*0.5)*0.18;const atScale=Math.min(1,(progress-0.4)*4);
const atH=90*atScale,atW=70*atScale,aty=H-200-atH;
ctx.fillStyle='#c8b898';
ctx.fillRect(atx-atW/2,aty,atW,atH); // main block
// Arch opening
ctx.fillStyle='#a09070';
ctx.beginPath();ctx.arc(atx,aty+atH*0.62,atW*0.28,Math.PI,0);
ctx.fillRect(atx-atW*0.28,aty+atH*0.62,atW*0.56,atH*0.38);ctx.fill();
// Attic with relief friezes
ctx.fillStyle='#d8c8a8';ctx.fillRect(atx-atW/2,aty,atW,atH*0.2);
ctx.fillStyle='#b0a080';ctx.fillRect(atx-atW/2,aty+atH*0.18,atW,3);
// Columns / pilasters
for(const cx2 of[-0.38,-0.15,0.15,0.38]){
ctx.fillStyle='#c0b090';ctx.fillRect(atx+cx2*atW-4*atScale,aty+atH*0.2,8*atScale,atH*0.6);}
// Cornice top
ctx.fillStyle='#d8c8a8';ctx.fillRect(atx-atW/2-4,aty-4,atW+8,8);
// Eternal flame hint
if(atScale>0.7){ctx.fillStyle='rgba(255,150,50,0.6)';ctx.beginPath();ctx.ellipse(atx,aty+atH-8,6,4,0,0,Math.PI*2);ctx.fill();}
}
// Eiffel Tower — 4 distinct legs with arch openings
if(progress>0.45){const etScale=Math.min(1,(progress-0.45)*2.5);
const etx=W*0.82-(camX-LEVEL_WIDTH*0.65)*0.12;
const etH=330*etScale;const ety=H-200-etH;const gnd=H-200;
const etl='#6a5a48',eth='#7a6a58',etc='#5a4a38';
const f1=gnd-etH*0.22;const f2=gnd-etH*0.42;
ctx.fillStyle=etl;
// Left outer leg (dramatic splay)
ctx.beginPath();ctx.moveTo(etx-64*etScale,gnd);ctx.quadraticCurveTo(etx-60*etScale,gnd-etH*0.12,etx-36*etScale,f1);ctx.lineTo(etx-30*etScale,f1);ctx.quadraticCurveTo(etx-52*etScale,gnd-etH*0.12,etx-52*etScale,gnd);ctx.closePath();ctx.fill();
// Left inner leg
ctx.beginPath();ctx.moveTo(etx-22*etScale,gnd);ctx.quadraticCurveTo(etx-25*etScale,gnd-etH*0.10,etx-28*etScale,f1);ctx.lineTo(etx-24*etScale,f1);ctx.quadraticCurveTo(etx-18*etScale,gnd-etH*0.10,etx-10*etScale,gnd);ctx.closePath();ctx.fill();
// Right inner leg
ctx.beginPath();ctx.moveTo(etx+10*etScale,gnd);ctx.quadraticCurveTo(etx+18*etScale,gnd-etH*0.10,etx+24*etScale,f1);ctx.lineTo(etx+28*etScale,f1);ctx.quadraticCurveTo(etx+25*etScale,gnd-etH*0.10,etx+22*etScale,gnd);ctx.closePath();ctx.fill();
// Right outer leg (dramatic splay)
ctx.beginPath();ctx.moveTo(etx+52*etScale,gnd);ctx.quadraticCurveTo(etx+52*etScale,gnd-etH*0.12,etx+30*etScale,f1);ctx.lineTo(etx+36*etScale,f1);ctx.quadraticCurveTo(etx+60*etScale,gnd-etH*0.12,etx+64*etScale,gnd);ctx.closePath();ctx.fill();
// First floor platform
ctx.fillStyle=eth;ctx.fillRect(etx-38*etScale,f1-5,76*etScale,10);ctx.fillStyle='#8a7a68';ctx.fillRect(etx-40*etScale,f1-7,80*etScale,4);
// Middle section (f1 to f2, tapered)
ctx.fillStyle=etl;ctx.beginPath();ctx.moveTo(etx-30*etScale,f1);ctx.lineTo(etx+30*etScale,f1);ctx.lineTo(etx+13*etScale,f2);ctx.lineTo(etx-13*etScale,f2);ctx.closePath();ctx.fill();
// Second floor platform
ctx.fillStyle=eth;ctx.fillRect(etx-16*etScale,f2-5,32*etScale,10);ctx.fillStyle='#8a7a68';ctx.fillRect(etx-18*etScale,f2-7,36*etScale,4);
// Upper section (f2 to ety, very narrow)
ctx.fillStyle=etl;ctx.beginPath();ctx.moveTo(etx-13*etScale,f2);ctx.lineTo(etx+13*etScale,f2);ctx.lineTo(etx+3,ety);ctx.lineTo(etx-3,ety);ctx.closePath();ctx.fill();
// Top platform
ctx.fillStyle=eth;ctx.fillRect(etx-7*etScale,ety,14*etScale,6);
// Lattice — middle section
ctx.strokeStyle=etc;ctx.lineWidth=1.2;
for(let b=0;b<5;b++){const t=b/4;const by=f1+(f2-f1)*t;const bw=(30+(13-30)*t)*etScale;
ctx.beginPath();ctx.moveTo(etx-bw,by);ctx.lineTo(etx+bw,by);ctx.stroke();
if(b<4){const t2=(b+1)/4;const by2=f1+(f2-f1)*t2;const bw2=(30+(13-30)*t2)*etScale;
ctx.beginPath();ctx.moveTo(etx-bw,by);ctx.lineTo(etx+bw2,by2);ctx.stroke();
ctx.beginPath();ctx.moveTo(etx+bw,by);ctx.lineTo(etx-bw2,by2);ctx.stroke();}}
// Lattice — upper section
for(let b=0;b<7;b++){const t=b/6;const by=f2+(ety-f2)*t;const bw=(13+(2-13)*t)*etScale;
ctx.beginPath();ctx.moveTo(etx-bw,by);ctx.lineTo(etx+bw,by);ctx.stroke();}
// Antenna
ctx.fillStyle=etl;ctx.fillRect(etx-2,ety-32*etScale,4,32*etScale);ctx.fillRect(etx-1,ety-42*etScale,2,12*etScale);
const blink=Math.sin(Date.now()*0.005)>0;if(blink){ctx.fillStyle='rgba(255,80,80,0.9)';ctx.beginPath();ctx.arc(etx,ety-42*etScale,3,0,Math.PI*2);ctx.fill();}
// Night glow edges
ctx.strokeStyle='rgba(255,220,100,0.10)';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(etx-64*etScale,gnd);ctx.quadraticCurveTo(etx-22*etScale,f2,etx,ety);ctx.stroke();
ctx.beginPath();ctx.moveTo(etx+64*etScale,gnd);ctx.quadraticCurveTo(etx+22*etScale,f2,etx,ety);ctx.stroke();}


// === MID BUILDINGS (Closer Haussmann with more detail) ===
const mid=camX*0.25;
for(let i=0;i<18;i++){
const bx=i*110-mid%110-110;const bh=45+Math.sin(i*1.6)*20+((i*11)%15);
const bw=90+((i*7)%25);
const colors=[['#e8d8c0','#c8b898'],['#ddd0b8','#bdb098'],['#f0e0c8','#d0c0a0'],['#e0d0b8','#c0b098']];
const [c,d]=colors[i%4];
drawHaussmannBuilding(ctx,bx,H-155-bh,bw,bh,c,d);
// Café awning on some
if(i%3===0){const awC=i%6===0?'#c0392b':'#27ae60';
ctx.fillStyle=awC;
ctx.beginPath();ctx.moveTo(bx+5,H-155);ctx.lineTo(bx+5,H-148);ctx.lineTo(bx+35,H-148);ctx.lineTo(bx+40,H-155);ctx.closePath();ctx.fill();
// Awning stripes
ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(bx+12,H-154,4,6);ctx.fillRect(bx+22,H-154,4,6);
// Small café table + chairs
ctx.fillStyle='#333';ctx.fillRect(bx+10,H-147,1,7);ctx.fillRect(bx+15,H-147,1,7);
ctx.fillStyle='#555';ctx.fillRect(bx+8,H-147,10,2);
}
// Flower boxes (pink/red flowers on balconies)
if(i%2===0){
ctx.fillStyle='#5a4a3a';ctx.fillRect(bx+10,H-155-bh+bh*0.4,20,4);
ctx.fillStyle='#e74c3c';
for(let fl=0;fl<5;fl++)ctx.fillRect(bx+11+fl*4,H-155-bh+bh*0.4-3+Math.sin(fl)*1,3,3);
ctx.fillStyle='#2ecc71';ctx.fillRect(bx+10,H-155-bh+bh*0.4-1,20,2);
}
}

// Seine river (visible in section 2)
if(progress>0.2&&progress<0.55){
ctx.fillStyle='#4a85c9';ctx.fillRect(0,H-152,W,14);
ctx.fillStyle='rgba(107,179,240,0.4)';
for(let r=0;r<W;r+=25){const ry=H-150+Math.sin(r*0.05+camX*0.01)*2;
ctx.fillRect(r-camX*0.3%25,ry,12,2)}
// Stone bridge
ctx.fillStyle='#a09080';ctx.beginPath();
ctx.ellipse(W*0.5,H-145,60,18,0,Math.PI,Math.PI*2);ctx.fill();
ctx.fillRect(W*0.5-60,H-148,120,6);ctx.fillStyle='#8a7a6a';
ctx.fillRect(W*0.5-58,H-150,4,8);ctx.fillRect(W*0.5+54,H-150,4,8);ctx.fillRect(W*0.5-2,H-150,4,8);
}

// Trees (more Parisian - rounded, trimmed)
const treOff=camX*0.3;
for(let i=0;i<12;i++){const tx=i*130-treOff%130-65;
ctx.fillStyle='#4a3520';ctx.fillRect(tx+10,H-168,5,28);
// Rounded Parisian trimmed tree crown
ctx.fillStyle='#2d7a3e';ctx.beginPath();ctx.ellipse(tx+12,H-178,15,18,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#3a8a4e';ctx.beginPath();ctx.ellipse(tx+15,H-175,10,14,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#1d6a2e';ctx.beginPath();ctx.ellipse(tx+9,H-180,8,12,0,0,Math.PI*2);ctx.fill();}

// Parisian street lamps
const lampOff=camX*0.35;
for(let i=0;i<8;i++){const lx=i*160-lampOff%160-80;
ctx.fillStyle='#2a2a2a';ctx.fillRect(lx,H-168,3,30);
ctx.fillRect(lx-4,H-168,11,2);
ctx.fillStyle='#e6b800';ctx.fillRect(lx-2,H-170,7,4);
// Lamp glow
ctx.fillStyle='rgba(255,220,100,0.12)';ctx.beginPath();ctx.ellipse(lx+1,H-165,15,20,0,0,Math.PI*2);ctx.fill();}

// Ground base (cobblestone pattern)
ctx.fillStyle='#9a8c7a';ctx.fillRect(0,H-TILE*2,W,TILE*2);
for(let gx=-TILE;gx<W+TILE;gx+=12){for(let gy=0;gy<TILE*2;gy+=8){
const ox=(gy/8)%2===0?0:6;
const shade=((gx+gy*3)%17)/17*0.15;
ctx.fillStyle=`rgba(${120-shade*80},${110-shade*70},${90-shade*60},1)`;
ctx.fillRect(gx+ox-(camX*0.999)%12,H-TILE*2+gy,10,6);
ctx.fillStyle='rgba(0,0,0,0.08)';
ctx.fillRect(gx+ox-(camX*0.999)%12,H-TILE*2+gy+6,10,1);
ctx.fillRect(gx+ox-(camX*0.999)%12+10,H-TILE*2+gy,1,6);
}}
}

// ============ LEVEL GENERATOR (Linear Platformer) ============
function generateLevel(){
const platforms=[];const enemies=[];const collectibles=[];const signs=[];
const T=TILE;const gY=H-T*2;
// Ground spans — full 200 tiles, no gaps (seamless street)
for(let i=0;i<=200;i++)platforms.push({x:i*T,y:gY,w:T,h:T*2,type:'ground'});
// ===== SECTION 1: Montmartre (tiles 0-47) =====
for(let i=0;i<5;i++)platforms.push({x:(8+i)*T,y:gY-T*(2+i),w:T*3,h:T,type:'stone'});
platforms.push({x:25*T,y:gY-T*3,w:T*5,h:T,type:'stone'});
platforms.push({x:33*T,y:gY-T*4,w:T*4,h:T,type:'stone'});
signs.push({x:3*T,y:gY-T*3,text:'\u00a1Feliz Cumple Laura! \uD83C\uDF82'});
signs.push({x:35*T,y:gY-T*2,text:'\u00a1Correr en Par\u00eds! \uD83C\uDDEB\uD83C\uDDF7'});
for(let i=0;i<3;i++){const types=['capsule_andres','capsule_mateo','capsule_josefina'];
  collectibles.push({x:(5+i*2)*T,y:gY-T*2,type:types[i],collected:false});}
for(let i=12;i<3;i++){const types=['capsule_leire','capsule_helena','capsule_mateo'];
  collectibles.push({x:(12+i*2)*T,y:gY-T*3,type:types[i],collected:false});}
for(let i=18;i<40;i+=8)collectibles.push({x:i*T,y:gY-T*3,type:'bocata',collected:false});
collectibles.push({x:30*T,y:gY-T*5,type:'pwrup',power:'doublejump',collected:false});

class Game{
constructor(canvas){
this.canvas=canvas;this.ctx=canvas.getContext('2d');

}
reset(){

this.mateo={active:false,x:0,y:0,frame:0};

this.leire={active:false,x:0,y:0,timer:0,frame:0};

this.camX=0;this.score=0;this.bocatas=0;this.rPackages=0;this.enemiesDefeated=0;
this.frame=0;this.particles=[];this.projectiles=[];this.textPopups=[];
this.victoryPhase=0;this.victoryTimer=0;this.typewriterIdx=0;
// Trekking level state
this.trekkingFrame=0;this.trekkingCamX=0;this.trekkingPlatforms=[];
// Driving level state
this.drivingLane=1;this.drivingTimer=0;this.traffic=[];this.drivingHP=3;
this.carX=150;this.carY=250;this.carTargetY=250;this._driveLaneChange=0;this.drivingFrame=0;

}
initInput(){
window.addEventListener('keydown',e=>{
this.keys[e.code]=true;
if(e.code==='Space'){e.preventDefault();
if(this.state==='menu'){AudioSys.init();MusicSys.start();this.state='instructions';this.instructionTimer=0;}
else if(this.state==='instructions'){this.state='intro';this.introScene=0;this.introTimer=0;}
else if(this.state==='intro'){this.introScene++;this.introTimer=0;if(this.introScene>=3){this.state='trekking';this.initTrekking();}}
else if(this.state==='trekking'){this._doJump=true;}
else if(this.state==='playing'){this._doJump=true;}
else if(this.state==='pre_drive_cutscene'){this.state='driving';this.initDriving();}
else if(this.state==='pre_paris_cutscene'){this.state='playing';this.startTime=Date.now();this.player.hp=1;this.player.maxHp=6;}
else if(this.state==='ending_cutscene'){this.state='victory_concert';this.victoryTimer=0;this.frame=0;}
else if(this.state==='victory_concert'){this.reset();this.state='menu';}
else if(this.state==='gameover'){this.reset();this.introScene=0;this.introTimer=0;this.state='intro';}}
if((e.code==='ArrowUp'||e.code==='KeyW')&&(this.state==='playing'||this.state==='trekking')){this._doJump=true;}
if((e.code==='ArrowUp'||e.code==='KeyW')&&this.state==='driving'&&this._driveLaneChange===0){if(this.drivingLane>0){this.drivingLane--;this._driveLaneChange=25;}}
if((e.code==='ArrowDown'||e.code==='KeyS')&&this.state==='driving'&&this._driveLaneChange===0){if(this.drivingLane<2){this.drivingLane++;this._driveLaneChange=25;}}

});

shootErlenmeyer(){

const isMega=p.powers.megashot>0;
this.projectiles.push({x:p.x+p.w/2,y:p.y+10,vx:9*p.dir,vy:0,life:65,owner:'player',isErlenmeyer:true,dmg:2});

this.projectiles.push({x:p.x+p.w/2,y:p.y+16,vx:9*p.dir,vy:1,life:65,owner:'player',isErlenmeyer:true,dmg:2});}
p.rCooldown=isMega?35:80;AudioSys.shoot();
for(let i=0;i<5;i++)this.particles.push({x:p.x+p.w/2,y:p.y+10,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:15,color:'#44ffcc',size:2});

getLaneY(l){return[H*0.32,H*0.52,H*0.72][l]}
initDriving(){
this.drivingLane=1;this.drivingTimer=600;this.traffic=[];this.drivingHP=3;
this.carX=130;this.carY=this.getLaneY(1);this.carTargetY=this.getLaneY(1);
this._driveLaneChange=0;this.drivingFrame=0;this.lastTrafficSpawn=0;
}
updateDriving(){
if(this.state!=='driving')return;
this.drivingFrame++;this.drivingTimer--;
if((this.keys['ArrowUp']||this.keys['KeyW'])&&this._driveLaneChange===0&&this.drivingLane>0){this.drivingLane--;this._driveLaneChange=25;}
if((this.keys['ArrowDown']||this.keys['KeyS'])&&this._driveLaneChange===0&&this.drivingLane<2){this.drivingLane++;this._driveLaneChange=25;}
if(this._driveLaneChange>0)this._driveLaneChange--;
this.carTargetY=this.getLaneY(this.drivingLane);
this.carY+=(this.carTargetY-this.carY)*0.18;
const spawnInterval=Math.max(22,75-this.drivingFrame*0.07);
if(this.drivingFrame-this.lastTrafficSpawn>spawnInterval){
const lane=Math.floor(Math.random()*3);
const spd=8+Math.random()*5;
this.traffic.push({x:W+60,y:this.getLaneY(lane),w:70,h:40,speed:spd,color:['#c44','#4a8','#44c','#a84','#c84'][Math.floor(Math.random()*5)]});
// Occasionally spawn a second car in a different lane
if(this.drivingFrame>120&&Math.random()<0.4){
  const lane2=(lane+1+Math.floor(Math.random()*2))%3;
  this.traffic.push({x:W+120,y:this.getLaneY(lane2),w:70,h:40,speed:spd+Math.random()*3,color:['#c44','#4a8','#44c','#a84','#c84'][Math.floor(Math.random()*5)]});}
this.lastTrafficSpawn=this.drivingFrame;}
this.traffic=this.traffic.filter(t=>{
t.x-=t.speed+4;
if(Math.abs(t.x-(this.carX+40))<45&&Math.abs(t.y-this.carY)<25){
this.drivingHP--;t.x=-200;AudioSys.hit();
if(this.drivingHP<=0){this.state='gameover';}}
return t.x>-200;});
if(this.drivingTimer<=0){this.state='pre_paris_cutscene';this.cutsceneTimer=0;}
}
drawDriving(){
const ctx=this.ctx;ctx.clearRect(0,0,W,H);
// Sky gradient (French countryside)
const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#5ab5d8');sky.addColorStop(0.5,'#a8d870');sky.addColorStop(1,'#c8d860');
ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
// Rolling hills
ctx.fillStyle='#5a9a40';ctx.beginPath();ctx.moveTo(0,H*0.55);
for(let xi=0;xi<=W;xi+=30){ctx.lineTo(xi,H*0.55+Math.sin((xi+this.drivingFrame*2)*0.015)*25);}
ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
// Road (3 lanes)
ctx.fillStyle='#555';ctx.fillRect(0,H*0.25,W,H*0.55);
ctx.fillStyle='#444';ctx.fillRect(0,H*0.25,W,4);ctx.fillRect(0,H*0.8,W,4);
// Lane markings
const laneOff=(this.drivingFrame*4)%80;
ctx.fillStyle='#ffe';
for(let xi=-80;xi<W+80;xi+=80){ctx.fillRect(xi-laneOff,H*0.455,40,4);ctx.fillRect(xi-laneOff,H*0.62,40,4);}
// Roadside trees — top edge (above road, trees scroll right-to-left as car moves forward)
for(let i=0;i<8;i++){const tx=(W-(((i*140+this.drivingFrame*6)%W+W)%W));
ctx.fillStyle='#2a1a08';ctx.fillRect(tx+6,H*0.23,5,H*0.02);
ctx.fillStyle='#2d7a3e';ctx.beginPath();ctx.ellipse(tx+8,H*0.22,12,14,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#3a8a4a';ctx.beginPath();ctx.ellipse(tx+10,H*0.20,8,10,0,0,Math.PI*2);ctx.fill();}
// Roadside trees — bottom edge (near roadside, scroll right-to-left)
for(let i=0;i<8;i++){const tx=(W-(((i*140+70+this.drivingFrame*6)%W+W)%W));
ctx.fillStyle='#2a1a08';ctx.fillRect(tx+6,H*0.79,6,H*0.05);
ctx.fillStyle='#2d7a3e';ctx.beginPath();ctx.ellipse(tx+9,H*0.78,18,22,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#3a8a4a';ctx.beginPath();ctx.ellipse(tx+12,H*0.75,12,15,0,0,Math.PI*2);ctx.fill();}
// Traffic cars
for(const t of this.traffic){
ctx.fillStyle=t.color;ctx.fillRect(t.x,t.y-20,t.w,t.h);
ctx.fillStyle='#aaccee';ctx.fillRect(t.x+8,t.y-18,18,10);ctx.fillRect(t.x+30,t.y-18,16,10);
ctx.fillStyle='#222';ctx.beginPath();ctx.arc(t.x+15,t.y+20,9,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(t.x+t.w-15,t.y+20,9,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#ff4444';ctx.fillRect(t.x,t.y-8,6,5);}
// Laura's car
drawCar(ctx,this.carX,Math.round(this.carY)-20,this.drivingFrame);
// HUD
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(5,5,180,30);
ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.fillText('\u{1F697} Driving to Paris!',10,24);
const prog=1-(this.drivingTimer/600);
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-100,8,200,16);
ctx.fillStyle='#e6b800';ctx.fillRect(W/2-98,10,196*prog,12);
ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('Paris '+Math.round(prog*100)+'%',W/2,20);ctx.textAlign='left';
ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W/2-120,H-40,240,30);
ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('\u2191\u2193 Change lanes — avoid traffic!',W/2,H-21);ctx.textAlign='left';
}
// ============ TREKKING LEVEL ============
generateTrekPlatforms(){
const T=TILE;
// [x_tiles, height_from_bottom_tiles, width_tiles]
const steps=[
[0,2,9],[9.15,3,7],[16.2,4,6],[22.3,5,5],[27.4,7,4],
[31.5,8,5],[36.6,10,4],[40.7,11,4],[44.8,13,5],
[49.9,15,4],[54,17,5],[59.1,19,4],[64.2,20,5],
[70.3,21,4],[75.4,23,5],[81.5,22,4],[86.6,20,5],
[91.7,18,4],[96.8,16,5],[102.9,14,4],[107,12,5],
[112.1,10,4],[116.1,8,5],[121.1,6,5],[126.1,4,5],
[131.1,3,5],[136.1,2,9]
];
return steps.map(([xt,ht,wt])=>({x:Math.round(xt*T),y:H-ht*T,w:wt*T,h:ht*T+60,type:'trek'}));
}
initTrekking(){
this.trekkingFrame=0;this.trekkingCamX=0;this.trekkingCamY=0;
const T=TILE;
const p=this.player;
p.x=80;p.y=H-2*T-38;p.vx=0;p.vy=0;p.dir=1;p.grounded=false;
p.hp=5;p.maxHp=5;p.invincible=0;p.rCooldown=0;p.speedMult=1;p.shieldHp=0;
p.powers={star:0,coffee:0,megashot:0,doublejump:0,piano:0};p.extraJumps=0;
this.trekkingPlatforms=this.generateTrekPlatforms();
const sy=H-2*T-38;
// Sheep obstacles on trekking platforms
this.trekkingSheep=[];
const sheepPlatforms=[1,3,5,7,10,12,14,16,18,20,22,24]; // more sheep
for(const pi of sheepPlatforms){
  if(pi<this.trekkingPlatforms.length){
    const pl=this.trekkingPlatforms[pi];
    const sx=pl.x+pl.w*0.2+Math.random()*pl.w*0.4;
    this.trekkingSheep.push({x:sx,y:pl.y-28,w:42,h:28,platIdx:pi,platX:pl.x,platW:pl.w,dir:Math.random()<0.5?1:-1,speed:0.4+Math.random()*0.5});
  }
}
// Trekking companions (5 friends)
const cs={active:false,x:p.x-60,y:sy,vy:0,grounded:false,timer:0,frame:0,unlocked:false};
this.andres={...cs};this.josefina={...cs};this.leire={...cs};this.mateo={...cs};this.josebas={...cs};
// Kept for Paris section but not active in trekking
this.helena={...cs};this.carolina={...cs};this.camila={...cs};this.cris={...cs};
}
updateTrekking(){
if(this.state!=='trekking')return;
this.trekkingFrame++;
const p=this.player;
// Input
let moveX=0;
if(this.keys['ArrowLeft']||this.keys['KeyA']){moveX=-1;p.dir=-1;}
if(this.keys['ArrowRight']||this.keys['KeyD']){moveX=1;p.dir=1;}
if(this._doJump){this._doJump=false;if(p.grounded){p.vy=JUMP_FORCE;p.grounded=false;AudioSys.jump();}}
// Physics (Axis-Separated AABB)
p.vx+=moveX*ACCEL;p.vx*=FRICTION;
p.vx=Math.max(-MAX_SPEED,Math.min(MAX_SPEED,p.vx));
p.vy+=GRAVITY;
// X collision
p.x+=p.vx;
for(const pl of this.trekkingPlatforms){
if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y<pl.y+pl.h){
  if(p.vx>0){p.x=pl.x-p.w;p.vx=0;}
  else if(p.vx<0){p.x=pl.x+pl.w;p.vx=0;}
}}
// Y collision
p.y+=p.vy;p.grounded=false;
for(const pl of this.trekkingPlatforms){
if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y<pl.y+pl.h){
  if(p.vy>0){p.y=pl.y-p.h;p.vy=0;p.grounded=true;}
  else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;}
}}
// Fall: respawn on nearest platform below
if(p.y>H+60){p.x=Math.max(80,p.x-30);p.y=H-2*TILE-38;p.vx=0;p.vy=0;}
if(p.x<0)p.x=0;
// Camera
this.trekkingCamX=Math.max(0,Math.min(86*TILE-W,p.x-W*0.35));
// Companion unlock triggers — 5 friends join on the way up
const T2=TILE;
const triggers=[
  {comp:this.andres,  trigX:10*T2, col:'#e8a020', name:'\u00a1Andr\u00e9s se une! \uD83E\uDDEA'},
  {comp:this.josefina,trigX:22*T2, col:'#ff69b4', name:'\u00a1Josefina se une! \uD83D\uDC97'},
  {comp:this.mateo,   trigX:35*T2, col:'#4488ff', name:'\u00a1Mateo se une! \uD83C\uDFC3'},
  {comp:this.josebas, trigX:50*T2, col:'#ff8844', name:'\u00a1Josebas se une! \uD83C\uDFB8'},
  {comp:this.leire,   trigX:62*T2, col:'#2ecc71', name:'\u00a1Leire se une! \u2697\uFE0F'},
];
for(const t of triggers){
  if(!t.comp.unlocked&&p.x>t.trigX){
    t.comp.unlocked=true;t.comp.active=true;
    t.comp.x=p.x-50;t.comp.y=p.y;
    this.textPopups.push({x:p.x-30,y:p.y-40,text:t.name,life:100,vy:-0.4});
    for(let i=0;i<16;i++)this.particles.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.5)*7,life:35,color:t.col,size:3});
    AudioSys.summon();
  }
}
// Companions: autonomous NPC — walk toward Laura, own gravity+terrain
const comps=[this.andres,this.josefina,this.mateo,this.josebas,this.leire];
const offsets=[55,110,165,220,275];
const CW=28,CH=38; // companion bounding box
for(let i=0;i<comps.length;i++){
  const c=comps[i];
  if(!c.active)continue;
  // Teleport if too far from Laura (lost companion recovery)
  if(Math.abs(c.x-p.x)>500||Math.abs(c.y-p.y)>400){c.x=p.x-offsets[i];c.y=p.y;c.vy=0;}
  // Walk toward target X — speed matches Laura's max so companions never fall behind
  const targetX=p.x-offsets[i];
  const dx=targetX-c.x;
  c.x+=Math.sign(dx)*Math.min(Math.abs(dx),5);
  c.frame++;
  // Gravity
  c.vy+=GRAVITY;
  c.y+=c.vy;
  // Platform collision
  c.grounded=false;
  for(const pl of this.trekkingPlatforms){
    if(c.x+CW>pl.x&&c.x<pl.x+pl.w&&c.y+CH>pl.y&&c.y+CH<pl.y+pl.h+10&&c.vy>=0){
      c.y=pl.y-CH;c.vy=0;c.grounded=true;break;
    }
  }
  // Jump when Laura is on a higher platform
  if(c.grounded&&p.y<c.y-TILE){c.vy=JUMP_FORCE*0.9;c.grounded=false;}
  // Fell off world — snap back near Laura
  if(c.y>H+200){c.x=p.x-offsets[i];c.y=p.y;c.vy=0;}
}
// Sheep movement — bounce within their platform
if(this.trekkingSheep){for(const sh of this.trekkingSheep){
  sh.x+=sh.dir*sh.speed;
  if(sh.x<=sh.platX+4){sh.x=sh.platX+4;sh.dir=1;}
  if(sh.x+sh.w>=sh.platX+sh.platW-4){sh.x=sh.platX+sh.platW-sh.w-4;sh.dir=-1;}
}}
// Sheep collision
if(this.trekkingSheep){
for(const sh of this.trekkingSheep){
  if(p.x+p.w>sh.x&&p.x<sh.x+sh.w&&p.y+p.h>sh.y&&p.y<sh.y+sh.h){
    // Stomp from above = safe bounce
    if(p.vy>0&&p.y+p.h<sh.y+sh.h/2+5){p.vy=JUMP_FORCE*0.6;AudioSys.jump();
    this.textPopups.push({x:sh.x,y:sh.y-10,text:'Baaaa! 🐑',life:40,vy:-1});}
    else if(p.invincible<=0){
      p.hp--;p.invincible=90;AudioSys.hit();p.vy=JUMP_FORCE*0.5;
      this.textPopups.push({x:sh.x,y:sh.y-10,text:'¡Oveja! -1',life:40,vy:-1});
      for(let i=0;i<6;i++)this.particles.push({x:sh.x+sh.w/2,y:sh.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:20,color:'#e8e8e8',size:3});
      if(p.hp<=0){this.state='gameover';}
    }
  }
}}
// Particles & popups active in trekking
this.updateParticles();this.updateTextPopups();
// Camera follow
const targetCX=Math.max(0,p.x-W*0.35);
this.trekkingCamX += (targetCX - this.trekkingCamX) * 0.1;
const targetCY = p.y - H*0.45;
this.trekkingCamY += (targetCY - this.trekkingCamY) * 0.15;
// Hard clamp: player must always be visible on screen
const screenY = p.y - this.trekkingCamY;
if(screenY < 60) this.trekkingCamY = p.y - 60;
if(screenY > H - 60) this.trekkingCamY = p.y - (H - 60);
// End: reach the peak platform → pre-drive cutscene
if(p.x>76*TILE){
this.state='pre_drive_cutscene';this.cutsceneTimer=0;
for(const c of comps)c.active=false;}
}

// Paris sign (on last platform)

ctx.fillText('\u2192 Paris!',spL.x+spL.w-77,spL.y-90);ctx.textAlign='left';
// Draw companions behind Laura
const compData=[

for(const[comp,fn,col,nm]of compData){

update(){
this.frame++;
if(this.state==='menu')return;
if(this.state==='instructions'){this.instructionTimer++;return;}
if(this.state==='intro'){this.frame++;this.introTimer++;
const dur=[300,250,270];if(this.introTimer>dur[this.introScene]){this.introScene++;this.introTimer=0;if(this.introScene>=3){this.state='trekking';this.initTrekking();}}return;}
if(this.state==='trekking'){this.updateTrekking();return;}
if(this.state==='pre_drive_cutscene'){this.cutsceneTimer++;if(this.cutsceneTimer>180){this.state='driving';this.initDriving();}return;}
if(this.state==='driving'){this.updateDriving();return;}
if(this.state==='pre_paris_cutscene'){this.cutsceneTimer++;if(this.cutsceneTimer>180){this.state='playing';this.startTime=Date.now();this.player.hp=this.player.maxHp;}return;}
if(this.state==='ending_cutscene'){this.cutsceneTimer++;if(this.cutsceneTimer>480){this.state='victory_concert';this.victoryTimer=0;this.frame=0;}return;}
if(this.state==='victory_concert')return;
if(this.state!=='playing')return;
this.frame++;this.elapsed=Date.now()-this.startTime;
const p=this.player;
// Input
let moveX=0;
if(this.keys['ArrowLeft']||this.keys['KeyA']){moveX=-1;p.dir=-1}
if(this.keys['ArrowRight']||this.keys['KeyD']){moveX=1;p.dir=1}
if(this._doJump){this._doJump=false;
if(p.grounded){p.vy=JUMP_FORCE;p.grounded=false;AudioSys.jump();p.extraJumps=p.powers.doublejump>0?1:0;}
else if(p.extraJumps>0){p.vy=JUMP_FORCE*0.85;p.extraJumps--;AudioSys.jump();}}
// Physics (Axis-Separated AABB Collision)
const dt=1; // Currently using 1 as scale, can parameterize later
const spd=MAX_SPEED*p.speedMult*(p.powers.coffee>0?1.7:1);
p.vx+=moveX*ACCEL;p.vx*=FRICTION;
p.vx=Math.max(-spd,Math.min(spd,p.vx));
p.vy+=GRAVITY*dt;

// 1. Move X and resolve horizontal collisions
p.x+=p.vx*dt;
for(const plat of this.platforms){
if(p.x+p.w>plat.x&&p.x<plat.x+plat.w&&p.y+p.h>plat.y&&p.y<plat.y+plat.h){
  if(p.vx>0){p.x=plat.x-p.w;p.vx=0;}
  else if(p.vx<0){p.x=plat.x+plat.w;p.vx=0;}
}}

// 2. Move Y and resolve vertical collisions
p.y+=p.vy*dt;
p.grounded=false;
for(const plat of this.platforms){
if(p.x+p.w>plat.x&&p.x<plat.x+plat.w&&p.y+p.h>plat.y&&p.y<plat.y+plat.h){
  if(p.vy>0){p.y=plat.y-p.h;p.vy=0;p.grounded=true;}
  else if(p.vy<0){p.y=plat.y+plat.h;p.vy=0;} // ceiling bump
}}
// Fall death
if(p.y>H+50){p.hp=0;this.checkDeath()}
// Boundaries
if(p.x<0)p.x=0;
// Camera
this.camX=Math.max(0,Math.min(LEVEL_WIDTH-W,p.x-W*0.35));
// Invincibility
if(p.invincible>0)p.invincible--;
// Star power = always invincible while active
if(p.powers.star>0)p.invincible=Math.max(p.invincible,2);
// Cooldowns
if(p.rCooldown>0)p.rCooldown--;
if(p.andresCooldown>0)p.andresCooldown--;
// Power timers countdown
for(const pw of Object.keys(p.powers)){if(p.powers[pw]>0)p.powers[pw]--;}
// Piano auto-fire
if(p.powers.piano>0&&this.frame%18===0){
const notes=['\u266A','\u266B','\u2669','\u266C'];
this.projectiles.push({x:p.x+p.w/2,y:p.y+8,vx:9*p.dir,vy:-0.5,
text:notes[Math.floor(Math.random()*notes.length)],life:55,owner:'player',isPiano:true});
AudioSys.piano();}
// Sync Companions to HP (Permanent in Paris)
const hp=p.hp;
this.andres.active = hp >= 2;
this.mateo.active = hp >= 3;
this.josefina.active = hp >= 4;
this.leire.active = hp >= 5;
this.helena.active = hp >= 6;

// Passive power: Andrés speed boost
p.speedMult = this.andres.active ? 1.25 : 1.0;
// Passive power: Leire shield recharge
if(this.leire.active && p.shieldHp < 3 && this.frame % 450 === 0){
  p.shieldHp++;
}

// Andrés companion
if(this.andres.active){
this.andres.frame++;
this.andres.x+=(p.x-40-this.andres.x)*0.1;
this.andres.y+=(p.y-this.andres.y)*0.1;
if(this.andres.frame%40===0){
const snippets=['R>','tidyr()','purrr()','stringr()'];
this.projectiles.push({x:this.andres.x+14,y:this.andres.y+10,vx:7,vy:0,
text:snippets[Math.floor(Math.random()*snippets.length)],life:50,owner:'andres'})}
if(this.frame%3===0)this.particles.push({x:p.x+Math.random()*28,y:p.y+38,vx:(Math.random()-0.5),vy:1,life:15,color:'#e6b800',size:2})}
// Mateo companion — Blue suit, fires SQL/JS code
if(this.mateo.active){
this.mateo.frame++;
this.mateo.x+=(p.x+20-this.mateo.x)*0.1;this.mateo.y+=(p.y-this.mateo.y)*0.1;
if(this.mateo.frame%42===0){const codes=['SELECT*','join()','JS>>','fetch()','Array[]'];
this.projectiles.push({x:this.mateo.x+14,y:this.mateo.y+10,vx:8*p.dir,vy:0,text:codes[Math.floor(Math.random()*codes.length)],life:50,owner:'mateo'});}
if(this.frame%3===0)this.particles.push({x:this.mateo.x+Math.random()*28,y:this.mateo.y+38,vx:(Math.random()-0.5),vy:1,life:15,color:'#33aacc',size:2});}
// Josefina companion — fires Python code, follows right side
if(this.josefina.active){
this.josefina.frame++;
this.josefina.x+=(p.x+50-this.josefina.x)*0.1;this.josefina.y+=(p.y-this.josefina.y)*0.1;
if(this.josefina.frame%35===0){const py=['print()','def bot():','import AI','class()','robot()'];
this.projectiles.push({x:this.josefina.x+14,y:this.josefina.y+10,vx:8*p.dir,vy:0,text:py[Math.floor(Math.random()*py.length)],life:50,owner:'josefina'});}
if(this.frame%4===0)this.particles.push({x:this.josefina.x+Math.random()*28,y:this.josefina.y+38,vx:(Math.random()-0.5),vy:1,life:15,color:'#ff69b4',size:2});}
// Leire companion — throws Erlenmeyer flasks at enemies
if(this.leire.active){
this.leire.frame++;
this.leire.x+=(p.x-50-this.leire.x)*0.1;this.leire.y+=(p.y-this.leire.y)*0.1;
if(this.leire.frame%48===0){
  this.projectiles.push({x:this.leire.x+14,y:this.leire.y+8,vx:9*p.dir,vy:0,life:65,owner:'leire',isErlenmeyer:true,dmg:2});}
if(this.frame%5===0)this.particles.push({x:this.leire.x+Math.random()*28,y:this.leire.y+Math.random()*38,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:20,color:'#44ff88',size:2});}
// Helena companion — fires oligonucleotides (max 3 active)
if(this.helena.active){
this.helena.frame++;
this.helena.x+=(p.x+55-this.helena.x)*0.1;this.helena.y+=(p.y-this.helena.y)*0.1;
const helenaShots=this.projectiles.filter(pr=>pr.owner==='helena').length;
if(this.helena.frame%50===0&&helenaShots<3){const dna=['ATCG~','DNA>>','\u231BCGTA','oligo!'];
this.projectiles.push({x:this.helena.x+14,y:this.helena.y+8,vx:9*p.dir,vy:0,text:dna[Math.floor(Math.random()*dna.length)],life:55,owner:'helena',isDNA:true});}
if(this.frame%4===0)this.particles.push({x:this.helena.x+Math.random()*28,y:this.helena.y+38,vx:(Math.random()-0.5),vy:1,life:15,color:'#cc44ff',size:2});}
// Companion cooldowns
if(p.josefinaCooldown>0)p.josefinaCooldown--;
if(p.leireCooldown>0)p.leireCooldown--;
if(p.helenaCooldown>0)p.helenaCooldown--;
this.updateProjectiles();this.updateEnemies();this.updateCollectibles();this.updateParticles();this.updateTextPopups();
// Victory check — reach end of Paris run
if(p.x>93*TILE&&p.y<H-TILE*10){this.state='ending_cutscene';this.cutsceneTimer=0;this.victoryPhase=0;this.victoryTimer=0;AudioSys.celebrate();}
}
updateProjectiles(){
const p=this.player;
this.projectiles=this.projectiles.filter(pr=>{
pr.x+=pr.vx;pr.life--;
// Hit enemies
for(const e of this.enemies){
if(!e.alive)continue;
const ex=e.x,ey=e.type==='semicolon'?e.baseY+Math.sin(e.frame*0.05)*40:e.y;
const ew=e.type==='segfault'?48:28,eh=e.type==='segfault'?40:28;
if(pr.x>ex&&pr.x<ex+ew&&pr.y>ey&&pr.y<ey+eh){
e.hp-=(pr.dmg||1);if(e.hp<=0){e.alive=false;this.enemiesDefeated++;this.score+=e.type==='segfault'?300:100;
AudioSys.enemyDie();this.spawnDeathParticles(ex,ey);
this.textPopups.push({x:ex,y:ey-10,text:e.type==='segfault'?'+300':'+100',life:40,vy:-1})}
// Erlenmeyer shatters on impact (green splash particles)
if(pr.isErlenmeyer){for(let i=0;i<8;i++)this.particles.push({x:ex+ew/2,y:ey+eh/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:25,color:'#44ffcc',size:3});}
return false}}
return pr.life>0&&pr.x>this.camX-50&&pr.x<this.camX+W+50});
}

  const nx=48+ni*78+Math.sin(f*0.05+ni*1.2)*22;
  const ny=stageY-((f*1.2+ni*52)%225);
  if(ny<-10||ny>stageY)continue;
  ctx.fillStyle=`rgba(255,${155+ni*14},${35+ni*18},${0.55+Math.sin(f*0.1+ni)*0.3})`;
  ctx.font='bold 17px monospace';ctx.fillText(ns[ni%4],nx,ny);}}
// === CONFETTI + FIREWORKS ===
if(vt>190){
if(f%2===0){for(let i=0;i<5;i++){
  this.particles.push({x:Math.random()*W,y:-10,vx:(Math.random()-0.5)*3,vy:Math.random()*4+1.5,
  life:110,color:['#ff4488','#e6b800','#8b5cf6','#44ffaa','#44aaff','#ffaa44','#fff'][i%7],size:4+Math.random()*4});}}
if(f%50===0){const fwx=50+Math.random()*700;const fwy=15+Math.random()*130;
const fwc=['#ff4488','#e6b800','#44ffaa','#44aaff','#ff8844'][Math.floor(Math.random()*5)];
for(let i=0;i<28;i++){const ang=Math.PI*2*i/28;const spd=2.5+Math.random()*3;
  this.particles.push({x:fwx,y:fwy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:55,color:fwc,size:3});}}
for(const pa of this.particles){ctx.globalAlpha=pa.life/110;ctx.fillStyle=pa.color;ctx.fillRect(pa.x,pa.y,pa.size,pa.size);}
ctx.globalAlpha=1;this.updateParticles();}
// === TYPEWRITER MESSAGE ===
if(vt>430){
const msg='¡De parte de todos tus amigos! Que este cumpleaños sea tan increíble como tú 🎸🎂💛';
const chars=Math.min(msg.length,Math.floor((vt-430)/2));
ctx.fillStyle='rgba(0,0,0,0.80)';ctx.fillRect(35,420,W-70,56);
ctx.strokeStyle='rgba(255,68,136,0.65)';ctx.lineWidth=1.5;ctx.strokeRect(35,420,W-70,56);
ctx.fillStyle='#ffe066';ctx.font='11px monospace';ctx.textAlign='center';
ctx.fillText(msg.substring(0,chars),W/2,452);ctx.textAlign='left';}
// === SCORE + PLAY AGAIN ===
if(vt>620){
ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(W/2-188,250,376,108);
ctx.strokeStyle='#ff4488';ctx.lineWidth=2;ctx.strokeRect(W/2-188,250,376,108);
ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='center';
const time2=Math.floor(this.elapsed/1000);
ctx.fillText('Bocatas: '+this.bocatas+'  |  Paquetes R: '+this.rPackages,W/2,274);
ctx.fillText('Enemigos: '+this.enemiesDefeated+'  |  Tiempo: '+Math.floor(time2/60)+'m '+time2%60+'s',W/2,294);
ctx.fillStyle=COLORS.gold;ctx.font='bold 13px monospace';ctx.fillText('Puntuación Final: '+this.score,W/2,318);
ctx.globalAlpha=0.5+Math.sin(f*0.08)*0.5;
ctx.fillStyle='#ff4488';ctx.font='bold 12px "Press Start 2P",monospace';
ctx.fillText('ESPACIO — volver al menú',W/2,347);
ctx.globalAlpha=1;ctx.textAlign='left';
if(this.keys['Space']){this.reset();this.state='menu';}}
this.frame++;
}
} // end Game class

// ============ GAME LOOP ============
const canvas=document.getElementById('gameCanvas');
const game=new Game(canvas);
function gameLoop(){
game.update();
game.render();
requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
